<!DOCTYPE html>
<html>
<head>
    <title>COOLKART LOGISTICS</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- HEADER -->
<header class="main-header">
    <img src="./logo.png" class="logo">
    <div class="header-text">
        <h1>COOLKART LOGISTICS</h1>
        <p>• Reliable • Secure Transport Solutions</p>
    </div>
</header>

<!-- NAVIGATION -->
<nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
</nav>

<!-- HERO SECTION -->
<div class="hero">
    <img src="truck.jpg" alt="Coolkart Truck" class="hero-img">

    <div class="hero-text">
        <h1>Reliable • Secure Truck Transport Across India</h1>
        <button onclick="showForm()">Request a Quote</button>
    </div>
</div>

<!-- QUOTE FORM -->
<div class="section" id="quoteForm" style="display:none;">
    
    <form action="https://formspree.io/f/xykdlbdz" method="POST">

        <input type="text" name="name" placeholder="Your Name" required><br>
        <input type="tel" name="phone" placeholder="Phone Number" required><br>
        <input type="text" name="pickup" placeholder="Pickup Location" required><br>
        <input type="text" name="delivery" placeholder="Delivery Location" required><br>
        <input type="email" name="email" placeholder="Your Email" required><br>

        <button type="submit">Submit</button>

    </form>

</div>

<!-- SERVICES -->
<div class="section" id="services">
    <h2>Our Services</h2>
    <div class="services">
        <div class="box">
            <h3>Road Transport</h3>
            <p>Fast and secure delivery across India.</p>
        </div>
    </div>
</div>

<!-- TRACKING -->
<div class="section">
    <h2>Track Your Shipment</h2>
    <input type="text" placeholder="Enter Tracking Number">
    <br>
    <button>Track</button>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
    <h2>Contact Us</h2>
       <form action="https://formspree.io/f/xpqjkbkb" method="POST" onsubmit="this.reset()" >

    <input type="text" name="name" placeholder="Your Name" required><br>

    <input type="email" name="email" placeholder="Your Email" required><br>

    <textarea name="message" placeholder="Your Message" required></textarea><br>

    <button type="submit">Send Message</button>

    </form>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 COOLKART LOGISTICS | All Rights Reserved</p>
</footer>

<!-- WhatsApp Button -->
<a class="whatsapp" href="https://wa.me/919150912750" target="_blank">💬</a>

<script>
function showForm() {
    document.getElementById("quoteForm").style.display = "block";
    window.location.hash = "quoteForm";
}
</script>

</body>
</html>
